<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Selector</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35' fill='white'/></svg>">
<style>
  :root {
    --accent:    #808080;
    --border:    #444;
    --hover-bg:  #252525;
    --text:      #e8e8e8;
    --muted:     #aaa;
    --bg:        #1c1c1c;
    --card-bg:   #2a2a2a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

  body {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: baseline;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  header h1 { font-size: 15px; font-weight: bold; color: var(--accent); }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 37px);
    overflow: hidden;
  }

  /* ---- Filters ---- */
  .filters {
    border-right: 1px solid var(--border);
    padding: 14px;
    overflow-y: auto;
    scrollbar-color: #3a3a3a var(--bg);
    scrollbar-width: thin;
  }
  .filters h2 {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .filter-group { margin-bottom: 16px; }
  .filter-group label.group-label {
    display: block;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .filter-group select {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    appearance: auto;
  }
  .filter-group select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .reset-btn {
    width: 100%;
    padding: 6px;
    background: var(--hover-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    margin-top: 4px;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--text); }

  .calc-btn {
    width: 100%;
    padding: 6px;
    background: var(--hover-bg);
    border: 1px solid #3a4c3a;
    border-radius: 3px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: #7a9a7a;
    margin-bottom: 8px;
  }
  .calc-btn:hover { border-color: #7cb87c; color: #7cb87c; }
  .calc-icon-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; padding: 0 2px; line-height: 1;
    color: var(--muted);
  }
  .calc-icon-btn:hover { color: #7cb87c; }

  /* ---- Results ---- */
  .results-pane {
    overflow-y: auto;
    padding: 14px 16px;
    scrollbar-color: #3a3a3a var(--bg);
    scrollbar-width: thin;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .results-header h2 { font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
  .count-badge {
    font-size: 12px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    background: var(--hover-bg);
  }

  /* 2-per-row grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* Card — flex column */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card:hover { border-color: var(--accent); }

  /* Card top row: model name left, badge right */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .card-model { font-size: 17px; font-weight: bold; color: var(--text); }
  .card-name  { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .avail-badge {
    font-size: 11px;
    font-weight: bold;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: .05em;
    flex-shrink: 0;
  }
  .avail-retail { color: #7cb87c; border-color: #3a5c3a; background: #1e2e1e; }
  .avail-dealer { color: #7a9fcc; border-color: #2a3d5c; background: #1a2535; }

  /* Tags row */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--hover-bg);
  }
  .tag-wifi             { color: #7a9fcc; border-color: #2a3d5c; background: #1a2535; }
  .tag-battery-included { color: #7cb87c; border-color: #3a5c3a; background: #1e2e1e; }
  .tag-battery-compat   { color: #c8b45a; border-color: #4c3e1e; background: #26200e; }

  /* Spec grid — 3 columns */
  .spec-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px 8px;
  }
  .spec-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #888;
    margin-bottom: 1px;
  }
  .spec-val {
    font-size: 13px;
    color: var(--text);
  }
  .spec-val.empty { color: #444; }

  .product-link {
    align-self: flex-start;
    font-size: 13px;
    font-family: inherit;
    color: #aaa;
    text-decoration: none;
    border: 1px solid #444;
    background: #363636;
    padding: 3px 9px;
    border-radius: 3px;
    margin-top: 2px;
  }
  .product-link:hover { color: var(--text); border-color: var(--accent); background: #404040; }

  /* Stores — full width below spec grid */
  .stores-row {
    font-size: 12px;
    color: #777;
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }
  .store-link { color:#777; text-decoration:underline; text-underline-offset:2px; }
  .store-link:hover { color:#aaa; }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-results h3 { font-size: 15px; margin-bottom: 6px; color: var(--text); }

  /* ---- Weight Calculator Modal ---- */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card-bg);
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    padding: 20px 24px;
    width: 400px;
    max-width: 94vw;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-title {
    font-size: 14px;
    font-weight: bold;
    color: var(--accent);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    font-family: inherit;
  }
  .modal-close:hover { color: var(--text); }

  .modal-field { margin-bottom: 12px; }
  .modal-field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .modal-field select {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    appearance: auto;
  }

  .modal-calc-btn {
    width: 100%;
    padding: 7px;
    background: var(--hover-bg);
    border: 1px solid var(--accent);
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    margin-top: 8px;
  }
  .modal-calc-btn:hover { background: #303030; }

  .modal-result {
    display: none;
    margin-top: 16px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--hover-bg);
  }
  .modal-result.visible { display: block; }
  .result-weight  { font-size: 22px; font-weight: bold; color: var(--text); margin-bottom: 4px; }
  .result-label   { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .result-breakdown { font-size: 11px; color: #666; line-height: 1.7; margin-bottom: 10px; }
  .apply-btn {
    width: 100%;
    padding: 6px;
    background: #1e2e1e;
    border: 1px solid #3a5c3a;
    border-radius: 3px;
    font-size: 13px;
    font-family: inherit;
    color: #7cb87c;
    cursor: pointer;
  }
  .apply-btn:hover { border-color: #7cb87c; }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .filters { border-right: none; border-bottom: 1px solid var(--border); }
    .results-pane { height: auto; }
  }
</style>
</head>
<body>

<header>
  <h1>Product Selector</h1>
</header>

<!-- ===== WEIGHT CALCULATOR MODAL ===== -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeCalc()">✕</button>
    <div class="modal-title">Door Weight Calculator</div>

    <div class="modal-field">
      <label>Door Height</label>
      <select id="calc-height">
        <option value="">Select...</option>
        <option value="7">7 ft</option><option value="8">8 ft</option>
        <option value="9">9 ft</option><option value="10">10 ft</option>
        <option value="11">11 ft</option><option value="12">12 ft</option>
        <option value="13">13 ft</option><option value="14">14 ft</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Door Width</label>
      <select id="calc-width">
        <option value="">Select...</option>
        <option value="7">7 ft</option><option value="8">8 ft</option>
        <option value="9">9 ft</option><option value="10">10 ft</option>
        <option value="11">11 ft</option><option value="12">12 ft</option>
        <option value="13">13 ft</option><option value="14">14 ft</option>
        <option value="15">15 ft</option><option value="16">16 ft</option>
        <option value="17">17 ft</option><option value="18">18 ft</option>
        <option value="19">19 ft</option><option value="20">20 ft</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Door Material</label>
      <select id="calc-material">
        <option value="">Select...</option>
        <option value="wood">Wood (~4.6 lbs/sq ft)</option>
        <option value="aluminum">Aluminum (~1.3 lbs/sq ft)</option>
        <option value="steel">Steel (~3.8 lbs/sq ft)</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Insulation</label>
      <select id="calc-insulation">
        <option value="non-insulated">Non-Insulated</option>
        <option value="insulated">Insulated (+20 lbs)</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Windows</label>
      <select id="calc-windows">
        <option value="no-windows">No Windows</option>
        <option value="has-windows">Has Windows (+3.5 lbs each)</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Hurricane Reinforcement Brackets</label>
      <select id="calc-reinforcement">
        <option value="none">Does Not Have Reinforcement Brackets</option>
        <option value="has-reinforcement">Has Reinforcement Brackets (+10 lbs)</option>
      </select>
    </div>

    <button class="modal-calc-btn" onclick="calcWeight()">Calculate Weight</button>

    <div class="modal-result" id="calc-result">
      <div class="result-weight" id="result-weight-num"></div>
      <div class="result-label" id="result-weight-label"></div>
      <div class="result-breakdown" id="result-breakdown"></div>
      <button class="apply-btn" id="apply-weight-btn" onclick="applyCalcWeight()">Apply to Door Weight Filter</button>
    </div>
  </div>
</div>

<div class="layout">

  <!-- ========== FILTERS ========== -->
  <aside class="filters">
    <h2>Filter Options</h2>

    <div class="filter-group">
      <label class="group-label">Channel</label>
      <select id="f-avail">
        <option value="">Any</option>
        <option value="dealer">Professional</option>
        <option value="retail">Retail</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Store</label>
      <select id="f-store">
        <option value="">Any</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Drive Type</label>
      <select id="f-drive">
        <option value="">Any</option>
        <option value="belt">Belt</option>
        <option value="chain">Chain</option>
        <option value="screw">Screw</option>
        <option value="jackshaft">Jackshaft / Wall Mount</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Door Type</label>
      <select id="f-doortype">
        <option value="">Any</option>
        <option value="sectional">Sectional</option>
        <option value="one-piece">One-Piece / High-Lift</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Door Height</label>
      <select id="f-height">
        <option value="">Any</option>
        <option value="7">7 ft</option>
        <option value="8">8 ft</option>
        <option value="9">9 ft</option>
        <option value="10">10 ft</option>
        <option value="11">11 ft</option>
        <option value="12">12 ft</option>
        <option value="13">13 ft</option>
        <option value="14">14 ft</option>
      </select>
    </div>

    <div class="filter-group">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <label class="group-label" style="margin-bottom:0">Door Weight</label>
        <button class="calc-icon-btn" onclick="openCalc()" title="Door Weight Calculator"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/></svg></button>
      </div>
      <select id="f-weight">
        <option value="">Any</option>
        <option value="350">0 – 350 lbs</option>
        <option value="500">350 – 500 lbs</option>
        <option value="750">500 – 750 lbs</option>
        <option value="850">750 – 850 lbs</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Motor Power (HPc)</label>
      <select id="f-hpc">
        <option value="">Any</option>
        <option value="0.5">½ HPc</option>
        <option value="0.75">¾ HPc</option>
        <option value="1">1 HPc</option>
        <option value="1.25">1¼ HPc</option>
        <option value="2">2 HPc</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Battery Backup</label>
      <select id="f-battery">
        <option value="">Any</option>
        <option value="included">Included</option>
        <option value="notincluded">Not Included</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Wi-Fi</label>
      <select id="f-wifi">
        <option value="">Any</option>
        <option value="yes">Integrated</option>
        <option value="no">None</option>
      </select>
    </div>

    <button class="reset-btn" onclick="resetFilters()">Reset All Filters</button>
  </aside>

  <!-- ========== RESULTS ========== -->
  <div class="results-pane">
    <div class="results-header">
      <h2>Matching Models</h2>
      <span class="count-badge" id="count">0 results</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>

<script>
function normalizeRow(r) {
  // split pipe-separated strings into arrays
  function toArr(v) {
    if (Array.isArray(v)) return v.map(s => s.trim()).filter(Boolean);
    return v ? v.split('|').map(s => s.trim()).filter(Boolean) : [];
  }
  return {
    model: r.model || '',
    name: r.name || '',
    drive: toArr(r.drive).map(d => d.toLowerCase()),
    avail: (r.avail || '').toLowerCase().includes('dealer') ? 'dealer' : 'retail',
    doorType: toArr(r.door_type).map(d => d.replace('*', '').trim().toLowerCase()),
    battery: (r.battery || '').toLowerCase(),
    wifi: r.wifi === true || r.wifi === 'yes',
    hpc: r.hpc ? parseFloat(r.hpc) : null,
    maxHeight: r.max_door_height ? parseInt(r.max_door_height) : null,
    maxWeight: r.max_door_weight ? parseInt(r.max_door_weight) : null,
    motorWarranty: r.motor_warranty ? parseInt(r.motor_warranty) : null,
    partsWarranty: r.parts_warranty ? parseInt(r.parts_warranty) : null,
    speed: r.opening_speed || '',
    stores: toArr(r.store).filter(s => s.toLowerCase() !== 'professional dealer'),
    storeUrls: toArr(r.store_urls),
    dealerUrl: r.avail === 'professional dealer' ? (toArr(r.store_urls)[0] || '') : '',
    url: r.url || '',
    manual: r.manual || '',
    warranty: r.warranty || '',
    parts: r.replacement_parts || '',
  };
}

const MODELS = (typeof MODELS_DATA !== 'undefined' ? MODELS_DATA : []).map(normalizeRow);

function buildStoreFilter() {
  const stores = new Set();
  MODELS.forEach(m => m.stores.forEach(s => stores.add(s)));
  const sel = document.getElementById('f-store');
  [...stores].sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

function getFilters() {
  const g = id => document.getElementById(id).value;
  return {
    avail: g('f-avail'),
    store: g('f-store'),
    drive: g('f-drive'),
    doortype: g('f-doortype'),
    height: g('f-height'),
    weight: g('f-weight'),
    hpc: g('f-hpc'),
    battery: g('f-battery'),
    wifi: g('f-wifi'),
  };
}

function applyFilters() {
  const f = getFilters();
  const filtered = MODELS.filter(m => {
    if (f.avail && m.avail !== f.avail) return false;
    if (f.store && !m.stores.includes(f.store)) return false;
    if (f.drive && !m.drive.includes(f.drive.toLowerCase())) return false;
    if (f.doortype === 'sectional' && !m.doorType.includes('sectional')) return false;
    if (f.doortype === 'one-piece' && !m.doorType.includes('one-piece')) return false;
    if (f.height) {
      const h = parseInt(f.height);
      if (h > 10 && (!m.maxHeight || m.maxHeight < 14)) return false;
      else if (h > 8  && (!m.maxHeight || m.maxHeight < 10)) return false;
    }
    if (f.weight) {
      const needed = parseInt(f.weight);
      if (!m.maxWeight || m.maxWeight < needed) return false;
    }
    if (f.hpc && m.hpc !== parseFloat(f.hpc)) return false;
    if (f.battery === 'included'    && m.battery !== 'included') return false;
    if (f.battery === 'notincluded' && m.battery === 'included') return false;
    if (f.wifi === 'yes' && !m.wifi)  return false;
    if (f.wifi === 'no'  &&  m.wifi)  return false;
    return true;
  });
  renderResults(filtered);
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function formatHpc(h) {
  const map = { 0.5: '½', 0.75: '¾', 1: '1', 1.25: '1¼', 2: '2' };
  if (h == null) return null;
  const frac = map[h] || h;
  return `<span style="font-family:Arial,sans-serif;font-size:16px">${frac}</span> HPc`;
}

function isUrl(v) { return v && v.startsWith('http'); }

function spec(label, val) {
  const display = (val != null && val !== '') ? val : '—';
  const cls = display === '—' ? ' empty' : '';
  return `<div class="spec-item"><div class="spec-label">${label}</div><div class="spec-val${cls}">${display}</div></div>`;
}

function renderResults(models) {
  const grid  = document.getElementById('grid');
  const count = document.getElementById('count');
  count.textContent = `${models.length} result${models.length !== 1 ? 's' : ''}`;

  if (models.length === 0) {
    grid.innerHTML = `<div class="no-results"><h3>No models match your filters</h3><p>Try relaxing one or more criteria.</p></div>`;
    return;
  }

  grid.innerHTML = models.map(m => {
    const availClass = m.avail === 'retail' ? 'avail-retail' : 'avail-dealer';
    const availLabel = m.avail === 'retail' ? 'Retail' : 'Professional';

    const driveLabel = m.drive.map(cap).join(' / ') || '—';
    const doorLabel  = m.doorType.length ? m.doorType.map(cap).join(' / ') : null;

    const batteryVal = m.battery === 'included'   ? '<span style="color:#7cb87c">Included</span>'
                     : m.battery === 'compatible' ? 'Compatible'
                     : 'Incompatible';
    const wifiVal    = m.wifi ? '<span style="color:#7cb87c">Integrated</span>' : 'Compatible';

    const motorWar = m.motorWarranty
      ? (m.motorWarranty === 99 ? 'Lifetime' : `${m.motorWarranty} yr`)
      : null;
    const partsWar = m.partsWarranty ? `${m.partsWarranty} yr` : null;

    const specGrid = `
      <div class="spec-grid">
        ${spec('Drive',           driveLabel)}
        ${spec('Wi-Fi',           wifiVal)}
        ${spec('Battery Backup',  batteryVal)}
        ${spec('Max Height',      m.maxHeight ? m.maxHeight + ' ft' : null)}
        ${spec('Max Weight',      m.maxWeight ? m.maxWeight + ' lbs' : null)}
        ${spec('Door Type',       doorLabel)}
        ${spec('Motor Power',     formatHpc(m.hpc))}
        ${spec('Motor Warranty',  motorWar)}
        ${spec('Parts Warranty',  partsWar)}
        ${spec('Opening Speed',   m.speed || null)}
        ${spec('Channel',         availLabel)}
      </div>`;

    const storesHtml = m.avail === 'dealer'
      ? `<div class="stores-row">Available at: ${m.dealerUrl ? `<a class="store-link" href="${m.dealerUrl}" target="_blank">Professional Dealer</a>` : 'Professional Dealer'}</div>`
      : (m.stores.length ? `<div class="stores-row">Available at: ${m.stores.map((s,i) => { const u = m.storeUrls && m.storeUrls[i]; return u ? `<a class="store-link" href="${u}" target="_blank">${s}</a>` : s; }).join(' · ')}</div>` : '');

    const linkHtml = [
      isUrl(m.url)     ? `<a class="product-link" href="${m.url}"     target="_blank">Product Page</a>` : '',
      isUrl(m.manual)  ? `<a class="product-link" href="${m.manual}"  target="_blank">Manual</a>`       : '',
      isUrl(m.warranty)? `<a class="product-link" href="${m.warranty}" target="_blank">Warranty</a>`    : '',
      isUrl(m.parts)   ? `<a class="product-link" href="${m.parts}"   target="_blank">Parts</a>`        : '',
    ].filter(Boolean).join('');

    return `
      <div class="card">
        <div class="card-top">
          <div>
            <div class="card-model">${m.model}</div>
            <div class="card-name">${m.name}</div>
          </div>
          <span class="avail-badge ${availClass}">${availLabel}</span>
        </div>
        ${specGrid}
        ${storesHtml}
        ${linkHtml ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${linkHtml}</div>` : ''}
      </div>`;
  }).join('');
}

function resetFilters() {
  document.querySelectorAll('.filters select').forEach(s => s.value = '');
  applyFilters();
}

document.querySelectorAll('.filters select').forEach(el => {
  el.addEventListener('change', applyFilters);
});

buildStoreFilter();
applyFilters();

// weight calculator
function openCalc()  { document.getElementById('modal-backdrop').classList.add('open'); }
function closeCalc() { document.getElementById('modal-backdrop').classList.remove('open'); }
function closeModal(e) { if (e.target === document.getElementById('modal-backdrop')) closeCalc(); }

function calcWeight() {
  const h = parseFloat(document.getElementById('calc-height').value);
  const w = parseFloat(document.getElementById('calc-width').value);
  const mat = document.getElementById('calc-material').value;
  const ins = document.getElementById('calc-insulation').value;
  const win = document.getElementById('calc-windows').value;
  const reinf = document.getElementById('calc-reinforcement').value;

  if (!h || !w || !mat) { alert('Please select height, width, and material.'); return; }

  const densities = { wood: 4.6, aluminum: 1.3, steel: 3.8 };
  const density = densities[mat];
  const sqft = h * w;
  const base = sqft * density;
  const insMod = ins === 'insulated' ? 20 : 0;
  const numWin = Math.round(w / 9 * 4);
  const winMod = win === 'has-windows' ? numWin * 3.5 : 0;
  const reinfMod = reinf === 'has-reinforcement' ? 10 : 0;
  const total = Math.round(base + insMod + winMod + reinfMod);

  const matName = { wood: 'Wood', aluminum: 'Aluminum', steel: 'Steel' }[mat];
  const parts = [
    `${sqft} sq ft × ${density} lbs/sq ft = ${Math.round(base)} lbs (${matName})`,
    insMod ? `+ ${insMod} lbs (insulation)` : '',
    winMod ? `+ ${winMod.toFixed(1)} lbs (${numWin} window${numWin !== 1 ? 's' : ''} × 3.5 lbs)` : '',
    reinfMod ? `+ ${reinfMod} lbs (reinforcement brackets)` : '',
  ].filter(Boolean);

  let category, catVal;
  if (total <= 350) { category = 'Up to 350 lbs'; catVal = '350'; }
  else if (total <= 500) { category = 'Up to 500 lbs'; catVal = '500'; }
  else if (total <= 750) { category = 'Up to 750 lbs'; catVal = '750'; }
  else { category = 'Up to 850 lbs'; catVal = '850'; }

  document.getElementById('result-weight-num').textContent = `~${total} lbs`;
  document.getElementById('result-weight-label').textContent = `Recommended filter: ${category}`;
  document.getElementById('result-breakdown').innerHTML = parts.join('<br>');
  document.getElementById('apply-weight-btn').dataset.val = catVal;
  document.getElementById('calc-result').classList.add('visible');
}

function applyCalcWeight() {
  const val = document.getElementById('apply-weight-btn').dataset.val;
  if (val) { document.getElementById('f-weight').value = val; applyFilters(); }
  closeCalc();
}
</script>
