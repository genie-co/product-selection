
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Selector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35' fill='white'/></svg>">
<style>
  :root {
    --accent:    #5A5E9F;
    --border:    #3E4172;
    --hover-bg:  #5A5E9F;
    --text:      #EDEEF1;
    --muted:     #B1B3BD;
    --bg:        #161722;
    --card-bg:   black;
    --button:    #191a2c;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { width: 0px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #aaaaaa; }

  body {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: baseline;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
    background-color: black;
  }
  header h1 { font-size: 15px; font-weight: 800; color: var(--text); font-family: 'Nunito', sans-serif; }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 37px);
    overflow: hidden;
  }

  /* ---- Filters ---- */
  .filters {
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    box-shadow: 3px 0 8px rgba(0,0,0,.08);
    padding: 10px 12px;
    overflow-y: auto;
    scrollbar-color: #aaaaaa #cccccc;
    scrollbar-width: thin;
  }
  .filter-group { margin-bottom: 8px; }
  .filter-group label.group-label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text);
    margin-bottom: 2px;
    font-family: 'Nunito', sans-serif;
  }
  .filter-group select {
    width: 100%;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 13px;
    font-family: 'Nunito', sans-serif;
    background: var(--card-bg);
    color: var(--muted);
    appearance: auto;
  }
  .filter-group select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .search-input {
    width: 100%;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 13px;
    font-family: 'Nunito', sans-serif;
    background: var(--button);
    color: var(--muted);
    margin-bottom: 8px;
  }
  .search-input:focus { outline: 1px solid var(--accent); outline-offset: 1px; }
  .search-input::placeholder { color: var(--muted); font-weight: 100 ; font-style: italic;}

  .reset-btn {
    width: 100%;
    padding: 4px;
    background: var(--button);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 12px;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    color: var(--text);
    margin-top: 4px;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--muted); }

  .calc-btn {
    width: 100%;
    padding: 6px;
    background: var(--card-bg);
    border: 1px solid #cccccc;
    border-radius: 3px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: #444444;
    margin-bottom: 8px;
  }
  .calc-btn:hover { border-color: #888; color: #111; }
  .calc-icon-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; padding: 0 2px; line-height: 1;
    color: var(--muted);
  }
  .calc-icon-btn:hover { color: #7cb87c; }

  /* ---- Results ---- */
  .results-pane {
    overflow-y: auto;
    padding: 14px 16px;
    scrollbar-color: var(--border) var(--bg);
    scrollbar-width: thin;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .results-header h2 { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-family: 'Nunito', sans-serif; }
  .count-badge {
    font-size: 12px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    background: var(--button);
  }

  /* 2-per-row grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* Card — flex column */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    
  }
  .card:hover { border-color: var(--accent); }

  /* Card top row: model name left, badge right */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .card-model { font-size: 17px; font-weight: 800; color: var(--text); font-family: 'Consolas', sans-serif; }
  .card-name   { font-size: 13px; color: var(--muted); font-style: italic; }
  .card-series { font-size: 11px; color: var(--muted); margin-top: 2px; margin-left: 1px; text-transform: uppercase; letter-spacing: .06em; font-style: bold; }

  .avail-badge {
    font-size: 11px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: .05em;
    flex-shrink: 0;
  }
  .avail-retail {  color: var(--muted); border-color: var(--card-bg);background: var(--card-bg);}
  .avail-dealer { color: var(--muted); border-color: var(--card-bg);background: var(--card-bg); }
  .avail-obsolete { color: #cc2222; border-color: var(--card-bg); background: var(--card-bg); }

  /* Tags row */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--button);
  }
  .tag-wifi             { color: #2a60aa; border-color: #7aaee0; background: #eaf2fc; }
  .tag-battery-included { color: #2a7a2a; border-color: #5aaa5a; background: #edf7ed; }
  .tag-battery-compat   { color: var(--muted); border-color: var(--border); background: var(--button); }

  /* Spec grid — 3 columns */
  .spec-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px 8px;
  }
  .spec-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .spec-val {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .spec-val.empty { color: #bbb; }

  .product-link {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-family: inherit;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    background: var(--button);
    padding: 3px 0px;
    border-radius: 3px;
    margin-top: 2px;
  }
  .product-link:hover { color: var(--text); border-color: var(--accent); background: var(--card-bg); }

  /* Stores — full width below spec grid */
  .stores-row {
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }
  .store-link { color: var(--muted); text-decoration: underline; text-decoration-color: #88888880; text-underline-offset: 4px; }
  .store-link:hover { color: var(--text); }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-results h3 { font-size: 15px; margin-bottom: 6px; color: var(--text); }

  /* ---- Weight Calculator Modal ---- */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card-bg);
    border: 1px solid #cccccc;
    border-radius: 4px;
    padding: 20px 24px;
    width: 400px;
    max-width: 94vw;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    font-family: inherit;
  }
  .modal-close:hover { color: var(--text); }

  .modal-field { margin-bottom: 12px; }
  .modal-field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .modal-field select {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    appearance: auto;
  }

  .modal-calc-btn {
    width: 100%;
    padding: 7px;
    background: var(--button);
    border: 1px solid var(--accent);
    border-radius: 3px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    margin-top: 8px;
  }
  .modal-calc-btn:hover { background: #d8d8d8; }

  .modal-result {
    display: none;
    margin-top: 16px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--button);
  }
  .modal-result.visible { display: block; }
  .result-weight  { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .result-label   { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .result-breakdown { font-size: 11px; color: #777; line-height: 1.7; margin-bottom: 10px; }
  .apply-btn {
    width: 100%;
    padding: 6px;
    background: #edf7ed;
    border: 1px solid #5aaa5a;
    border-radius: 3px;
    font-size: 13px;
    font-family: inherit;
    color: #2a7a2a;
    cursor: pointer;
  }
  .apply-btn:hover { border-color: #2a7a2a; }

  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .filters { border-right: none; border-bottom: 1px solid var(--border); }
    .results-pane { height: auto; }
  }

  /* ---- Color Customizer ---- */
  .color-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    color: var(--text);
  }
  .color-btn:hover { background: var(--button); }

  .color-panel {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 12px;
    z-index: 200;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,.45);
    width: 260px;
  }
  .color-panel.open { display: block; }
  .color-panel h2 {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .cp-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--text);
  }
  .cp-row label { flex: 1; min-width: 0; }
  .cp-swatch {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cp-hex {
    width: 72px;
    padding: 2px 5px;
    font-size: 11px;
    font-family: monospace;
    background: var(--button);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
  }
  .cp-hex:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .cp-hex.invalid { border-color: #e74c3c; }

  .cp-map-label {
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
    margin: 10px 0 5px;
  }
  .cp-map-area {
    width: 100%;
    height: 110px;
    position: relative;
    border-radius: 4px;
    border: 1px solid var(--border);
    cursor: crosshair;
    overflow: hidden;
  }
  .cp-map-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, #fff, transparent);
    pointer-events: none;
  }
  .cp-map-area::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent, #000);
    pointer-events: none;
  }
  .cp-map-cursor {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 3px rgba(0,0,0,.8);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }
  .cp-hue-track {
    width: 100%;
    height: 10px;
    border-radius: 5px;
    margin-top: 7px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    background: linear-gradient(to right,
      hsl(0,100%,50%), hsl(30,100%,50%), hsl(60,100%,50%), hsl(90,100%,50%),
      hsl(120,100%,50%), hsl(150,100%,50%), hsl(180,100%,50%), hsl(210,100%,50%),
      hsl(240,100%,50%), hsl(270,100%,50%), hsl(300,100%,50%), hsl(330,100%,50%),
      hsl(360,100%,50%));
    position: relative;
    cursor: pointer;
  }
  .cp-hue-thumb {
    position: absolute;
    top: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 3px rgba(0,0,0,.8);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .cp-reset {
    width: 100%;
    padding: 4px;
    font-size: 12px;
    font-family: 'Nunito', sans-serif;
    background: var(--button);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--text);
  }
  .cp-reset:hover { border-color: var(--accent); }
</style>
</head>
<body>

<header style="position:relative;">
  <h1>Product Selector</h1>
  <button class="color-btn" id="color-toggle-btn" title="Customize colors" aria-expanded="false">🎨</button>
  <div class="color-panel" id="color-panel" role="dialog" aria-label="Color customizer">
    <h2>Theme Colors</h2>
    <div class="cp-row"><label>Accent</label>          <span class="cp-swatch" id="sw-accent"></span><input class="cp-hex" data-var="--accent"  id="cp-accent"  maxlength="7"></div>
    <div class="cp-row"><label>Border</label>          <span class="cp-swatch" id="sw-border"></span><input class="cp-hex" data-var="--border"  id="cp-border"  maxlength="7"></div>
    <div class="cp-row"><label>Text</label>            <span class="cp-swatch" id="sw-text"></span>  <input class="cp-hex" data-var="--text"    id="cp-text"    maxlength="7"></div>
    <div class="cp-row"><label>Subtext</label>         <span class="cp-swatch" id="sw-muted"></span> <input class="cp-hex" data-var="--muted"   id="cp-muted"   maxlength="7"></div>
    <div class="cp-row"><label>Background</label>      <span class="cp-swatch" id="sw-bg"></span>    <input class="cp-hex" data-var="--bg"      id="cp-bg"      maxlength="7"></div>
    <div class="cp-row"><label>Card Background</label> <span class="cp-swatch" id="sw-card"></span>  <input class="cp-hex" data-var="--card-bg" id="cp-card-bg" maxlength="7"></div>
    <div class="cp-row"><label>Button</label>          <span class="cp-swatch" id="sw-button"></span><input class="cp-hex" data-var="--button"  id="cp-button"  maxlength="7"></div>
    <div class="cp-map-label">meow</div>
    <div class="cp-map-area" id="cp-map-area">
      <div class="cp-map-cursor" id="cp-map-cursor"></div>
    </div>
    <div class="cp-hue-track" id="cp-hue-track">
      <div class="cp-hue-thumb" id="cp-hue-thumb"></div>
    </div>
    <button class="cp-reset" id="cp-reset-btn">Reset to defaults</button>
  </div>
</header>

<!-- ===== WEIGHT CALCULATOR MODAL ===== -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeCalc()">✕</button>
    <div class="modal-title">Door Weight Calculator</div>

    <div class="modal-field">
      <label>Door Height</label>
      <select id="calc-height">
        <option value="">Select...</option>
        <option value="7">7'</option><option value="8">8'</option>
        <option value="9">9'</option><option value="10">10'</option>
        <option value="11">11'</option><option value="12">12'</option>
        <option value="13">13'</option><option value="14">14'</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Door Width</label>
      <select id="calc-width">
        <option value="">Select...</option>
        <option value="7">7'</option><option value="8">8'</option>
        <option value="9">9'</option><option value="10">10'</option>
        <option value="11">11'</option><option value="12">12'</option>
        <option value="13">13'</option><option value="14">14'</option>
        <option value="15">15'</option><option value="16">16'</option>
        <option value="17">17'</option><option value="18">18'</option>
        <option value="19">19'</option><option value="20">20'</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Door Material</label>
      <select id="calc-material">
        <option value="">Select...</option>
        <option value="wood">Wood</option>
        <option value="aluminum">Aluminum</option>
        <option value="steel">Steel</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Insulation</label>
      <select id="calc-insulation">
        <option value="non-insulated">Non-insulated</option>
        <option value="insulated">Insulated</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Windows</label>
      <select id="calc-windows">
        <option value="no-windows">No windows</option>
        <option value="has-windows">Has windows</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Reinforcement brackets</label>
      <select id="calc-reinforcement">
        <option value="none">None</option>
        <option value="has-reinforcement">Reinforced</option>
      </select>
    </div>

    <button class="modal-calc-btn" onclick="calcWeight()">Calculate Weight</button>

    <div class="modal-result" id="calc-result">
      <div class="result-weight" id="result-weight-num"></div>
      <div class="result-label" id="result-weight-label"></div>
      <div class="result-breakdown" id="result-breakdown"></div>
      <button class="apply-btn" id="apply-weight-btn" onclick="applyCalcWeight()">apply to filter</button>
    </div>
  </div>
</div>

<div class="layout">

  <!-- ========== FILTERS ========== -->
  <aside class="filters">
    <input class="search-input" id="search" type="text" placeholder="Search model or name…" oninput="applyFilters()">

    <div class="filter-group">
      <label class="group-label">Availability</label>
      <select id="f-avail1">
        <option value="">Any</option>
        <option value="current">Current</option>
        <option value="obsolete">Obsolete</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Channel</label>
      <select id="f-avail">
        <option value="">Any</option>
        <option value="dealer">Professional</option>
        <option value="retail">Retail</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Series</label>
      <select id="f-series">
        <option value="">Any</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Drive type</label>
      <select id="f-drive">
        <option value="">Any</option>
        <option value="belt">Belt</option>
        <option value="chain">Chain</option>
        <option value="screw">Screw</option>
        <option value="jackshaft">Jackshaft</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="group-label">Door type</label>
      <select id="f-doortype">
        <option value="">Any</option>
        <option value="sectional">Sectional</option>
        <option value="one-piece">One-piece</option>
      </select>
    </div>

<script>
function normalizeRow(r) {
  // split pipe-separated strings into arrays
  function toArr(v) {
    if (Array.isArray(v)) return v.map(s => s.trim()).filter(Boolean);
    return v ? v.split('|').map(s => s.trim()).filter(Boolean) : [];
  }
  return {
    model: r.model || '',
    name: r.name || '',
    series: r.series || '',
    channel: (r.channel || '').toLowerCase().includes('dealer') ? 'Professional' : (r.channel || '').toLowerCase().includes('retail') ? 'Retail' : '',
    drive: toArr(r.drive).map(d => d.toLowerCase()),
    avail: (r.avail || '').toLowerCase().includes('obs') ? 'obsolete' : (r.channel || '').toLowerCase().includes('dealer') ? 'dealer' : 'retail',
    doorType: toArr(r.door_type).map(d => d.replace('*', '').trim().toLowerCase()),
    battery: (r.battery || '').toLowerCase(),
    wifi: r.wifi === true || r.wifi === 'yes',
    hpc: r.hpc ? parseFloat(r.hpc) : null,
    maxHeight: r.max_door_height ? parseInt(r.max_door_height) : null,
    maxWeight: r.max_door_weight ? parseInt(r.max_door_weight) : null,
    motorWarranty: r.motor_warranty ? parseInt(r.motor_warranty) : null,
    partsWarranty: r.parts_warranty ? parseInt(r.parts_warranty) : null,
    speed: r.opening_speed || '',
    stores: toArr(r.store).filter(s => s.toLowerCase() !== 'professional dealer'),
    storeUrls: toArr(r.store_urls),
    dealerUrl: (r.channel || '').toLowerCase().includes('dealer') ? (toArr(r.store_urls)[0] || '') : '',
    url: r.url || '',
    manual: r.manual || '',
    warranty: r.warranty || '',
    parts: r.replacement_parts || '',
  };
}

const MODELS = (typeof MODELS_DATA !== 'undefined' ? MODELS_DATA : []).map(normalizeRow);

function buildStoreFilter() {
  const stores = new Set();
  MODELS.forEach(m => m.stores.forEach(s => stores.add(s)));
  const sel = document.getElementById('f-store');
  [...stores].sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  const seriesSet = new Set();
  MODELS.forEach(m => { if (m.series) seriesSet.add(m.series); });
  const sSel = document.getElementById('f-series');
  [...seriesSet].sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sSel.appendChild(opt);
  });
}

function getFilters() {
  const g = id => document.getElementById(id).value;
  return {
    avail: g('f-avail'),
    avail1: g('f-avail1'),
    series: g('f-series'),
    store: g('f-store'),
    drive: g('f-drive'),
    doortype: g('f-doortype'),
    height: g('f-height'),
    weight: g('f-weight'),
    hpc: g('f-hpc'),
    battery: g('f-battery'),
    wifi: g('f-wifi'),
  };
}

function applyFilters() {
  const f = getFilters();
  const search = (document.getElementById('search').value || '').toLowerCase().trim();
  const filtered = MODELS.filter(m => {
    if (search && !m.model.toLowerCase().includes(search) && !m.name.toLowerCase().includes(search)) return false;
    if (f.avail1 === 'current' && m.avail === 'obsolete') return false;
    if (f.avail1 === 'obsolete' && m.avail !== 'obsolete') return false;
    if (f.avail && m.avail !== f.avail) return false;
    if (f.series && m.series !== f.series) return false;
    if (f.store && !m.stores.includes(f.store)) return false;
    if (f.drive && !m.drive.includes(f.drive.toLowerCase())) return false;
    if (f.doortype === 'sectional' && !m.doorType.includes('sectional')) return false;
    if (f.doortype === 'one-piece' && !m.doorType.includes('one-piece')) return false;
    if (f.height) {
      const h = parseInt(f.height);
      if (h > 10 && (!m.maxHeight || m.maxHeight < 14)) return false;
      else if (h > 8  && (!m.maxHeight || m.maxHeight < 10)) return false;
    }
    if (f.weight) {
      const needed = parseInt(f.weight);
      if (!m.maxWeight || m.maxWeight < needed) return false;
    }
    if (f.hpc && m.hpc !== parseFloat(f.hpc)) return false;
    if (f.battery === 'included'    && m.battery !== 'included') return false;
    if (f.battery === 'notincluded' && m.battery === 'included') return false;
    if (f.wifi === 'yes' && !m.wifi)  return false;
    if (f.wifi === 'no'  &&  m.wifi)  return false;
    return true;
  });
  const availOrder = { retail: 0, dealer: 1, obsolete: 2 };
  filtered.sort((a, b) => (availOrder[a.avail] ?? 1) - (availOrder[b.avail] ?? 1));
  renderResults(filtered);
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function formatHpc(h) {
  const map = { 0.5: '½', 0.75: '¾', 1: '1', 1.25: '1¼', 2: '2' };
  if (h == null) return null;
  const frac = map[h] || h;
  return `${frac} HPc`;
}

function isUrl(v) { return v && v.startsWith('http'); }

function spec(label, val) {
  const display = (val != null && val !== '') ? val : '—';
  const cls = display === '—' ? ' empty' : '';
  return `<div class="spec-item"><div class="spec-label">${label}</div><div class="spec-val${cls}">${display}</div></div>`;
}

function renderResults(models) {
  const grid  = document.getElementById('grid');
  const count = document.getElementById('count');
  count.textContent = `${models.length} result${models.length !== 1 ? 's' : ''}`;

  if (models.length === 0) {
    grid.innerHTML = `<div class="no-results"><h3>No models match your filters</h3><p>Try relaxing one or more criteria.</p></div>`;
    return;
  }

  grid.innerHTML = models.map(m => {
    const availClass = m.avail === 'obsolete' ? 'avail-obsolete' : m.avail === 'retail' ? 'avail-retail' : 'avail-dealer';
    const availLabel = m.avail === 'obsolete' ? 'Obsolete' : m.avail === 'retail' ? 'Retail' : 'Professional';

    const driveLabel = cap(m.drive.join(' or ')) || '—';
    const doorLabel  = m.doorType.length ? m.doorType.map(d => d === 'one-piece' ? 'one-piece' : cap(d)).join(' / ') : null;

    const batteryVal = m.battery === 'included'   ? 'Included'
                     : m.battery === 'compatible' ? 'Compatible'
                     : 'Incompatible';
    const wifiVal    = m.wifi ? 'Integrated' : 'Compatible';

    const motorWar = m.motorWarranty
      ? (m.motorWarranty === 99 ? 'Lifetime' : `${m.motorWarranty} yr`)
      : null;
    const partsWar = m.partsWarranty ? `${m.partsWarranty} yr` : null;

    const specGrid = `
      <div class="spec-grid">
        ${spec('Series',          m.series || null)}
        ${spec('Channel',         m.channel || null)}
        ${spec('Drive',           driveLabel)}
        ${spec('Door Type',       doorLabel)}
        ${spec('Max Height',      m.maxHeight ? m.maxHeight + ' ft' : null)}
        ${spec('Max Weight',      m.maxWeight ? m.maxWeight + ' lbs' : null)}
        ${spec('Battery Backup',  batteryVal)}
        ${spec('Wi-Fi',           wifiVal)}
        ${spec('Opening Speed',   m.speed || null)}
        ${spec('Motor Warranty',  motorWar)}
        ${spec('Parts Warranty',  partsWar)}
        ${spec('Motor Power',     formatHpc(m.hpc))}
      </div>`;

    const storesHtml = m.avail === 'obsolete' ? ''
      : m.avail === 'dealer'
      ? `<div class="stores-row">Available at: ${m.dealerUrl ? `<a class="store-link" href="${m.dealerUrl}" target="_blank">Professional Dealer</a>` : 'Professional Dealer'}</div>`
      : (m.stores.length ? `<div class="stores-row">Available at: ${m.stores.map((s,i) => { const u = m.storeUrls && m.storeUrls[i]; return u ? `<a class="store-link" href="${u}" target="_blank">${s}</a>` : s; }).join(' · ')}</div>` : '');

    const linkHtml = m.avail === 'obsolete'
      ? [
          isUrl(m.url)      ? `<a class="product-link" href="${m.url}"      target="_blank">Product Page</a>` : m.url      ? `<span class="product-link" style="opacity:0.45;cursor:default">Product Page</span>` : '',
          isUrl(m.manual)   ? `<a class="product-link" href="${m.manual}"   target="_blank">Manual</a>`       : m.manual   ? `<span class="product-link" style="opacity:0.45;cursor:default">Manual</span>`       : '',
          isUrl(m.warranty) ? `<a class="product-link" href="${m.warranty}" target="_blank">Warranty</a>`    : m.warranty ? `<span class="product-link" style="opacity:0.45;cursor:default">Warranty</span>`     : '',
          isUrl(m.parts)    ? `<a class="product-link" href="${m.parts}"    target="_blank">Parts</a>`        : m.parts    ? `<span class="product-link" style="opacity:0.45;cursor:default">Parts</span>`        : '',
        ].filter(Boolean).join('')
      : [
          isUrl(m.url)     ? `<a class="product-link" href="${m.url}"     target="_blank">Product Page</a>` : '',
          isUrl(m.manual)  ? `<a class="product-link" href="${m.manual}"  target="_blank">Manual</a>`       : '',
          isUrl(m.warranty)? `<a class="product-link" href="${m.warranty}" target="_blank">Warranty</a>`    : '',
          isUrl(m.parts)   ? `<a class="product-link" href="${m.parts}"   target="_blank">Parts</a>`        : '',
        ].filter(Boolean).join('');

    return `
      <div class="card">
        <div class="card-top">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">
              <div class="card-model">${m.model}</div>
              <div class="card-name">${m.name}</div>
            </div>
          </div>
          <span class="avail-badge ${availClass}">${availLabel}</span>
        </div>
        ${specGrid}
        ${storesHtml}
        ${linkHtml ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${linkHtml}</div>` : ''}
      </div>`;
  }).join('');
}

function resetFilters() {
  document.querySelectorAll('.filters select').forEach(s => s.value = '');
  document.getElementById('search').value = '';
  localStorage.removeItem(STORAGE_KEY);
  applyFilters();
}

const FILTER_IDS = ['f-avail1','f-avail','f-series','f-drive','f-doortype','f-height','f-weight','f-hpc','f-battery','f-wifi','f-store','search'];
const STORAGE_KEY = 'productFilters';

function saveFilters() {
  const state = {};
  FILTER_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) state[id] = el.value;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function restoreFilters() {
  try {
    const state = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!state) return;
    FILTER_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el && state[id] !== undefined) el.value = state[id];
    });
  } catch(e) {}
}

document.querySelectorAll('.filters select').forEach(el => {
  el.addEventListener('change', () => { saveFilters(); applyFilters(); });
});
document.getElementById('search').addEventListener('input', saveFilters);

buildStoreFilter();
restoreFilters();
applyFilters();

// weight calculator
function openCalc()  { document.getElementById('modal-backdrop').classList.add('open'); }
function closeCalc() { document.getElementById('modal-backdrop').classList.remove('open'); }
function closeModal(e) { if (e.target === document.getElementById('modal-backdrop')) closeCalc(); }

function calcWeight() {
  const h = parseFloat(document.getElementById('calc-height').value);
  const w = parseFloat(document.getElementById('calc-width').value);
  const mat = document.getElementById('calc-material').value;
  const ins = document.getElementById('calc-insulation').value;
  const win = document.getElementById('calc-windows').value;
  const reinf = document.getElementById('calc-reinforcement').value;

  if (!h || !w || !mat) { alert('Please select height, width, and material.'); return; }

  const densities = { wood: 4.6, aluminum: 1.3, steel: 3.8 };
  const density = densities[mat];
  const sqft = h * w;
  const base = sqft * density;
  const insMod = ins === 'insulated' ? 20 : 0;
  const numWin = Math.round(w / 9 * 4);
  const winMod = win === 'has-windows' ? numWin * 3.5 : 0;
  const reinfMod = reinf === 'has-reinforcement' ? 10 : 0;
  const total = Math.round(base + insMod + winMod + reinfMod);

  const matName = { wood: 'Wood', aluminum: 'Aluminum', steel: 'Steel' }[mat];
  const parts = [
    `${sqft} sq ft × ${density} lbs/sq ft = ${Math.round(base)} lbs (${matName})`,
    insMod ? `+ ${insMod} lbs (insulation)` : '',
    winMod ? `+ ${winMod.toFixed(1)} lbs (${numWin} window${numWin !== 1 ? 's' : ''} × 3.5 lbs)` : '',
    reinfMod ? `+ ${reinfMod} lbs (reinforcement brackets)` : '',
  ].filter(Boolean);

  let category, catVal;
  if (total <= 350) { category = 'Up to 350 lbs'; catVal = '350'; }
  else if (total <= 500) { category = 'Up to 500 lbs'; catVal = '500'; }
  else if (total <= 750) { category = 'Up to 750 lbs'; catVal = '750'; }
  else { category = 'Up to 850 lbs'; catVal = '850'; }

  document.getElementById('result-weight-num').textContent = `~${total} lbs`;
  document.getElementById('result-weight-label').textContent = `Recommended filter: ${category}`;
  document.getElementById('result-breakdown').innerHTML = parts.join('<br>');
  document.getElementById('apply-weight-btn').dataset.val = catVal;
  document.getElementById('calc-result').classList.add('visible');
}

function applyCalcWeight() {
  const val = document.getElementById('apply-weight-btn').dataset.val;
  if (val) { document.getElementById('f-weight').value = val; applyFilters(); }
  closeCalc();
}

/* ---- Color Customizer ---- */
(function () {
  const DEFAULTS = {
    '--accent':   '#5A5E9F',
    '--border':   '#3E4172',
    '--hover-bg': '#5A5E9F',
    '--text':     '#EDEEF1',
    '--muted':    '#B1B3BD',
    '--bg':       '#12131B',
    '--card-bg':  '#000',
    '--button':   '#191a2c',
  };
  const STORAGE_KEY = 'productSelectorColorsDark';
  const root = document.documentElement;
  const HEX_RE = /^#[0-9a-fA-F]{6}$/;

  function hexToHsv(hex) {
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
    let h = 0;
    if (d) {
      if (max===r) h = ((g-b)/d + (g<b?6:0))/6;
      else if (max===g) h = ((b-r)/d + 2)/6;
      else h = ((r-g)/d + 4)/6;
    }
    return { h: h*360, s: max===0 ? 0 : (d/max)*100, v: max*100 };
  }

  function hsvToHex(h, s, v) {
    s /= 100; v /= 100;
    const f = n => { const k = (n + h/60) % 6; return v - v*s*Math.max(0, Math.min(k, 4-k, 1)); };
    return '#' + [f(5),f(3),f(1)].map(x => Math.round(x*255).toString(16).padStart(2,'0')).join('');
  }

  function applyColors(colors) {
    for (const [k, v] of Object.entries(colors)) root.style.setProperty(k, v);
  }

  function syncInputs(colors) {
    document.querySelectorAll('#color-panel .cp-hex').forEach(function(input) {
      const val = colors[input.dataset.var] || DEFAULTS[input.dataset.var];
      input.value = val;
      input.classList.remove('invalid');
      input.previousElementSibling.style.background = val;
    });
  }

  let activeInput = null;
  let cpHue = 0, cpSat = 0, cpVal = 100;

  function updateMap() {
    const area  = document.getElementById('cp-map-area');
    const cursor = document.getElementById('cp-map-cursor');
    const thumb  = document.getElementById('cp-hue-thumb');
    if (!area) return;
    area.style.background = 'hsl(' + cpHue + ',100%,50%)';
    cursor.style.left = cpSat + '%';
    cursor.style.top  = (100 - cpVal) + '%';
    thumb.style.left  = (cpHue / 360 * 100) + '%';
  }

  function commitColor(hex) {
    if (!activeInput) return;
    activeInput.value = hex;
    activeInput.classList.remove('invalid');
    activeInput.previousElementSibling.style.background = hex;
    const colors = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || Object.assign({}, DEFAULTS);
    colors[activeInput.dataset.var] = hex;
    root.style.setProperty(activeInput.dataset.var, hex);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(colors));
  }

  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || Object.assign({}, DEFAULTS);
  applyColors(saved);

  window.addEventListener('DOMContentLoaded', function () {
    syncInputs(saved);
    updateMap();

    const btn   = document.getElementById('color-toggle-btn');
    const panel = document.getElementById('color-panel');
    const area  = document.getElementById('cp-map-area');
    const hueTrack = document.getElementById('cp-hue-track');

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const open = panel.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function(e) {
      if (!panel.contains(e.target) && e.target !== btn) {
        panel.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });

    // Hex inputs — focus activates the map for that variable
    document.querySelectorAll('#color-panel .cp-hex').forEach(function(input) {
      input.addEventListener('focus', function() {
        activeInput = this;
        if (HEX_RE.test(this.value)) {
          const hsv = hexToHsv(this.value);
          cpHue = hsv.h; cpSat = hsv.s; cpVal = hsv.v;
          updateMap();
        }
      });
      input.addEventListener('input', function() {
        const val = this.value.startsWith('#') ? this.value : '#' + this.value;
        if (HEX_RE.test(val)) {
          this.classList.remove('invalid');
          this.previousElementSibling.style.background = val;
          const hsv = hexToHsv(val);
          cpHue = hsv.h; cpSat = hsv.s; cpVal = hsv.v;
          updateMap();
          const colors = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || Object.assign({}, DEFAULTS);
          colors[this.dataset.var] = val;
          root.style.setProperty(this.dataset.var, val);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(colors));
        } else {
          this.classList.add('invalid');
        }
      });
    });

    // 2D map drag
    var draggingMap = false;
    function pickMap(e) {
      var rect = area.getBoundingClientRect();
      cpSat = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
      cpVal = Math.max(0, Math.min(100, (1 - (e.clientY - rect.top) / rect.height) * 100));
      var hex = hsvToHex(cpHue, cpSat, cpVal);
      commitColor(hex);
      updateMap();
    }
    area.addEventListener('mousedown', function(e) { e.preventDefault(); draggingMap = true; pickMap(e); });
    document.addEventListener('mousemove', function(e) { if (draggingMap) pickMap(e); });
    document.addEventListener('mouseup',   function()  { draggingMap = false; });
    area.addEventListener('touchstart', function(e) { e.preventDefault(); pickMap(e.touches[0]); }, { passive: false });
    area.addEventListener('touchmove',  function(e) { e.preventDefault(); pickMap(e.touches[0]); }, { passive: false });

    // Hue slider drag
    var draggingHue = false;
    function pickHue(e) {
      var rect = hueTrack.getBoundingClientRect();
      cpHue = Math.max(0, Math.min(360, (e.clientX - rect.left) / rect.width * 360));
      var hex = hsvToHex(cpHue, cpSat, cpVal);
      commitColor(hex);
      updateMap();
    }
    hueTrack.addEventListener('mousedown', function(e) { e.preventDefault(); draggingHue = true; pickHue(e); });
    document.addEventListener('mousemove', function(e) { if (draggingHue) pickHue(e); });
    document.addEventListener('mouseup',   function()  { draggingHue = false; });
    hueTrack.addEventListener('touchstart', function(e) { e.preventDefault(); pickHue(e.touches[0]); }, { passive: false });
    hueTrack.addEventListener('touchmove',  function(e) { e.preventDefault(); pickHue(e.touches[0]); }, { passive: false });

    // Reset
    document.getElementById('cp-reset-btn').addEventListener('click', function() {
      applyColors(DEFAULTS);
      syncInputs(DEFAULTS);
      localStorage.removeItem(STORAGE_KEY);
      if (activeInput && HEX_RE.test(activeInput.value)) {
        var hsv = hexToHsv(activeInput.value);
        cpHue = hsv.h; cpSat = hsv.s; cpVal = hsv.v;
        updateMap();
      }
    });
  });
})();
</script>
</body>
</html>
