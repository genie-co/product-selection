<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Selector</title>
<style>
  :root {
    --accent:   #808080;
    --border:   #444;
    --hover-bg: #252525;
    --text:     #e8e8e8;
    --muted:    #aaa;
    --bg:       #1c1c1c;
    --card-bg:  #2a2a2a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

  body { font-family: Consolas,'Courier New',monospace; font-size:16px; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ---- Header ---- */
  header {
    position:sticky; top:0; z-index:100;
    background:var(--bg); border-bottom:1px solid var(--border);
    padding:6px 14px; display:flex; align-items:center; gap:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  header h1 { font-size:14px; font-weight:bold; color:var(--accent); white-space:nowrap; }
  .header-btn {
    padding:4px 10px; background:var(--hover-bg); border:1px solid var(--border);
    border-radius:3px; font-size:12px; font-family:inherit; color:var(--muted);
    cursor:pointer; white-space:nowrap;
  }
  .header-btn:hover { border-color:var(--accent); color:var(--text); }
  .header-btn.active { border-color:var(--accent); color:var(--accent); }

  /* ---- Layout ---- */
  .layout {
    display:grid; grid-template-columns:260px 1fr;
    height:calc(100vh - 37px); overflow:hidden; transition:grid-template-columns .2s;
  }
  .layout.sidebar-collapsed { grid-template-columns:0px 1fr; }

  /* ---- Filters ---- */
  .filters {
    border-right:1px solid var(--border); overflow-y:auto; overflow-x:hidden;
    scrollbar-color:#3a3a3a var(--bg); scrollbar-width:thin;
    transition:padding .2s;
  }
  .layout.sidebar-collapsed .filters { padding:0; border-right:none; }

  .sidebar-inner { padding:10px 14px; min-width:232px; }

  .sidebar-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
  }
  .sidebar-header h2 {
    font-size:12px; font-weight:bold; text-transform:uppercase;
    letter-spacing:.1em; color:var(--muted);
  }
  .collapse-btn {
    background:none; border:1px solid var(--border); border-radius:3px;
    color:var(--muted); font-size:12px; padding:2px 6px; cursor:pointer;
    font-family:inherit;
  }
  .collapse-btn:hover { border-color:var(--accent); color:var(--text); }

  .expand-btn {
    display:none; position:fixed; left:0; top:50%; transform:translateY(-50%);
    z-index:50; background:var(--card-bg); border:1px solid var(--border);
    border-left:none; border-radius:0 3px 3px 0; padding:12px 5px;
    color:var(--muted); cursor:pointer; font-size:12px; font-family:inherit;
    writing-mode:vertical-rl;
  }
  .expand-btn:hover { color:var(--text); border-color:var(--accent); }
  .layout.sidebar-collapsed ~ .expand-btn { display:block; }

  .filter-group { margin-bottom:14px; }
  .filter-group label.group-label {
    display:block; font-size:11px; font-weight:bold; text-transform:uppercase;
    letter-spacing:.08em; color:var(--muted); margin-bottom:4px;
  }
  .filter-group select, .search-box {
    width:100%; padding:5px 8px; border:1px solid var(--border); border-radius:3px;
    font-size:13px; font-family:inherit; background:var(--bg); color:var(--text);
    appearance:auto;
  }
  .filter-group select:focus, .search-box:focus { outline:2px solid var(--accent); outline-offset:1px; }
  .search-box::placeholder { color:#666; }

  .sort-row { display:flex; align-items:center; gap:6px; }
  .sort-row label { font-size:11px; font-weight:bold; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); white-space:nowrap; }
  .sort-row select { flex:1; }

  .reset-btn, .calc-btn {
    width:100%; padding:6px; border-radius:3px; font-size:13px;
    font-family:inherit; cursor:pointer; margin-bottom:6px;
  }
  .calc-btn { background:var(--hover-bg); border:1px solid #3a4c3a; color:#7a9a7a; }
  .calc-btn:hover { border-color:#7cb87c; color:#7cb87c; }
  .reset-btn { background:var(--hover-bg); border:1px solid var(--border); color:var(--muted); }
  .reset-btn:hover { border-color:var(--accent); color:var(--text); }

  /* ---- Presets ---- */
  .presets-list { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
  .preset-tag {
    display:inline-flex; align-items:center; gap:4px;
    font-size:11px; padding:2px 6px; border:1px solid #3a4c3a;
    border-radius:3px; color:#7a9a7a; background:var(--hover-bg); cursor:pointer;
  }
  .preset-tag:hover { border-color:#7cb87c; }
  .preset-del { color:#666; font-size:10px; }
  .preset-del:hover { color:#c87a7a; }
  .save-preset-btn {
    width:100%; padding:4px; background:none; border:1px dashed #3a4c3a;
    border-radius:3px; font-size:11px; font-family:inherit; color:#5a7a5a;
    cursor:pointer; margin-top:2px;
  }
  .save-preset-btn:hover { border-color:#7cb87c; color:#7cb87c; }

  /* ---- Recently viewed ---- */
  .recent-list { display:flex; flex-wrap:wrap; gap:4px; }
  .recent-tag {
    font-size:11px; padding:2px 6px; border:1px solid var(--border);
    border-radius:3px; color:var(--muted); background:var(--hover-bg);
    cursor:pointer;
  }
  .recent-tag:hover { border-color:var(--accent); color:var(--text); }

  /* ---- Results ---- */
  .results-pane { overflow-y:auto; padding:12px 14px; scrollbar-color:#3a3a3a var(--bg); scrollbar-width:thin; }
  .results-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border);
    gap:8px; flex-wrap:wrap;
  }
  .results-header h2 { font-size:12px; font-weight:bold; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .count-badge {
    font-size:12px; padding:2px 8px; border:1px solid var(--border);
    border-radius:8px; color:var(--muted); background:var(--hover-bg);
  }

  /* ---- Grid ---- */
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .grid.compact { grid-template-columns:repeat(3,1fr); gap:5px; }

  /* ---- Cards ---- */
  .card {
    background:var(--card-bg); border:1px solid var(--border); border-radius:3px;
    padding:12px 14px; display:flex; flex-direction:column; gap:8px;
    cursor:pointer; transition:border-color .1s;
  }
  .card:hover { border-color:var(--accent); }
  .card:focus { outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent); }
  .card.selected-for-compare { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .card.kb-focus { border-color:#7a9fcc; box-shadow:0 0 0 1px #7a9fcc; }

  .card-top {
    display:flex; justify-content:space-between; align-items:flex-start; gap:8px;
    border-bottom:1px solid var(--border); padding-bottom:8px;
  }
  .card-model { font-size:17px; font-weight:bold; color:var(--text); }
  .card-name  { font-size:12px; color:var(--muted); margin-top:2px; }

  .compact .card { padding:8px 10px; gap:5px; }
  .compact .card-model { font-size:14px; }
  .compact .card-name  { font-size:11px; }
  .compact .spec-grid  { grid-template-columns:repeat(3,1fr); gap:4px 6px; }
  .compact .spec-label { font-size:10px; }
  .compact .spec-val   { font-size:12px; }
  .compact .stores-row { display:none; }
  .compact .card-links { display:none; }

  .avail-badge {
    font-size:11px; font-weight:bold; padding:2px 7px; border-radius:3px;
    white-space:nowrap; border:1px solid var(--border); text-transform:uppercase;
    letter-spacing:.05em; flex-shrink:0;
  }
  .avail-retail { color:#7cb87c; border-color:#3a5c3a; background:#1e2e1e; }
  .avail-dealer { color:#7a9fcc; border-color:#2a3d5c; background:#1a2535; }

  .spec-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px 8px; }
  .spec-label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#888; margin-bottom:1px; }
  .spec-val { font-size:13px; color:var(--text); }
  .spec-val.empty { color:#444; }
  .spec-val.active-filter { color:#7cb87c; font-weight:bold; }

  .stores-row { font-size:12px; color:#777; border-top:1px solid var(--border); padding-top:6px; }
  .store-link { color:#777; text-decoration:underline; text-underline-offset:2px; }
  .store-link:hover { color:#aaa; }

  .product-link {
    align-self:flex-start; font-size:12px; font-family:inherit; color:#aaa;
    text-decoration:none; border:1px solid #444; background:#363636;
    padding:3px 8px; border-radius:3px;
  }
  .product-link:hover { color:var(--text); border-color:var(--accent); background:#404040; }

  .compare-check {
    font-size:12px; padding:2px 8px; border:1px solid #555; border-radius:3px;
    background:var(--hover-bg); color:var(--muted); cursor:pointer; font-family:inherit;
  }
  .compare-check.checked { border-color:var(--accent); color:var(--accent); }
  .compare-check:hover { border-color:#888; }

  .no-results { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
  .no-results h3 { font-size:15px; margin-bottom:8px; color:var(--text); }
  .no-results p { font-size:13px; margin-top:4px; }
  .suggestion-link { color:var(--accent); cursor:pointer; text-decoration:underline; }

  /* ---- Modals base ---- */
  .modal-backdrop {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.78);
    z-index:300; align-items:center; justify-content:center;
  }
  .modal-backdrop.open { display:flex; }
  .modal-close {
    position:absolute; top:10px; right:12px; background:none; border:none;
    color:var(--muted); font-size:18px; cursor:pointer; line-height:1; font-family:inherit;
  }
  .modal-close:hover { color:var(--text); }

  /* ---- Weight calc modal ---- */
  .modal {
    background:var(--card-bg); border:1px solid #3a3a3a; border-radius:4px;
    padding:20px 24px; width:400px; max-width:94vw; max-height:92vh;
    overflow-y:auto; position:relative;
  }
  .modal-title {
    font-size:13px; font-weight:bold; color:var(--accent); margin-bottom:14px;
    text-transform:uppercase; letter-spacing:.08em;
  }
  .modal-field { margin-bottom:10px; }
  .modal-field label {
    display:block; font-size:11px; text-transform:uppercase;
    letter-spacing:.07em; color:var(--muted); margin-bottom:3px;
  }
  .modal-field select {
    width:100%; padding:5px 8px; border:1px solid var(--border); border-radius:3px;
    font-size:13px; font-family:inherit; background:var(--bg); color:var(--text); appearance:auto;
  }
  .modal-calc-btn {
    width:100%; padding:7px; background:var(--hover-bg); border:1px solid var(--accent);
    border-radius:3px; font-size:13px; font-family:inherit; color:var(--text);
    cursor:pointer; margin-top:6px;
  }
  .modal-calc-btn:hover { background:#303030; }
  .modal-result {
    display:none; margin-top:14px; padding:12px 14px;
    border:1px solid var(--border); border-radius:3px; background:var(--hover-bg);
  }
  .modal-result.visible { display:block; }
  .result-weight { font-size:22px; font-weight:bold; color:var(--text); margin-bottom:4px; }
  .result-label  { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .result-breakdown { font-size:11px; color:#666; line-height:1.7; margin-bottom:10px; }
  .apply-btn {
    width:100%; padding:6px; background:#1e2e1e; border:1px solid #3a5c3a;
    border-radius:3px; font-size:13px; font-family:inherit; color:#7cb87c; cursor:pointer;
  }
  .apply-btn:hover { border-color:#7cb87c; }

  /* ---- Detail modal ---- */
  .detail-modal-backdrop {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.82);
    z-index:350; align-items:flex-start; justify-content:center;
    overflow-y:auto; padding:20px;
  }
  .detail-modal-backdrop.open { display:flex; }
  .detail-modal {
    background:var(--card-bg); border:1px solid #3a3a3a; border-radius:4px;
    padding:24px 28px; width:100%; position:relative;
  }
  .detail-model  { font-size:26px; font-weight:bold; color:var(--text); }
  .detail-name   { font-size:15px; color:var(--muted); margin-top:3px; margin-bottom:16px; }
  .detail-grid   { display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; margin-bottom:16px; }
  .detail-field  {}
  .detail-label  { font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:#777; margin-bottom:2px; }
  .detail-val    { font-size:14px; color:var(--text); }
  .detail-links  { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; border-top:1px solid var(--border); padding-top:14px; }
  .detail-nav    { display:flex; gap:8px; margin-top:16px; border-top:1px solid var(--border); padding-top:12px; }
  .detail-nav-btn {
    padding:5px 12px; background:var(--hover-bg); border:1px solid var(--border);
    border-radius:3px; font-size:12px; font-family:inherit; color:var(--muted); cursor:pointer;
  }
  .detail-nav-btn:hover { border-color:var(--accent); color:var(--text); }
  .detail-nav-btn:disabled { opacity:.3; cursor:default; }



  /* ---- Compare bar ---- */
  .compare-bar {
    display:none; position:fixed; bottom:0; left:0; right:0;
    background:#1e1e1e; border-top:1px solid var(--accent);
    padding:8px 16px; z-index:200; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .compare-bar.visible { display:flex; }
  .compare-bar span { font-size:12px; color:var(--muted); }
  .compare-tag {
    font-size:12px; padding:3px 8px; border:1px solid var(--accent);
    border-radius:3px; color:var(--text); cursor:pointer; background:var(--hover-bg);
  }
  .compare-tag:hover { background:#383838; }
  .compare-go-btn {
    margin-left:auto; padding:5px 14px; background:var(--accent); border:none;
    border-radius:3px; font-size:12px; font-family:inherit; color:#000; cursor:pointer; font-weight:bold;
  }
  .compare-go-btn:hover { background:#999; }
  .compare-clear-btn {
    padding:5px 10px; background:none; border:1px solid #555; border-radius:3px;
    font-size:12px; font-family:inherit; color:var(--muted); cursor:pointer;
  }
  .compare-clear-btn:hover { border-color:#888; color:var(--text); }

  /* ---- Compare modal ---- */
  .compare-modal-backdrop {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.88);
    z-index:400; align-items:flex-start; justify-content:center;
    overflow-y:auto; padding:20px;
  }
  .compare-modal-backdrop.open { display:flex; }
  .compare-modal {
    background:var(--card-bg); border:1px solid #3a3a3a; border-radius:4px;
    padding:20px; width:100%; max-width:960px; position:relative; margin:auto;
  }
  .compare-table { width:100%; border-collapse:collapse; font-size:13px; }
  .compare-table th {
    text-align:left; padding:8px 10px; border-bottom:1px solid var(--border);
    color:var(--text); font-size:13px;
  }
  .compare-table th.row-label { font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); width:120px; }
  .compare-table td { padding:6px 10px; border-bottom:1px solid #333; color:var(--text); vertical-align:top; }
  .compare-table tr:last-child td { border-bottom:none; }
  .compare-table .row-label-cell { font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  .compare-table .best { color:#7cb87c; font-weight:bold; }

  /* ---- Print ---- */
  /* ---- Print: card grid (default) ---- */
  @media print {
    * { background:white !important; color:#111 !important; border-color:#ccc !important; box-shadow:none !important; }
    header, .filters, .compare-bar, .compare-check, .card-links { display:none !important; }
    .layout { display:block !important; height:auto !important; }
    .results-pane { padding:0 !important; overflow:visible !important; }
    .results-header { border-bottom:2px solid #111 !important; margin-bottom:12px !important; }
    .grid { grid-template-columns:repeat(3,1fr) !important; gap:8px !important; }
    .card { break-inside:avoid; border:1px solid #ccc !important; padding:8px !important; cursor:default !important; }
    .avail-retail, .avail-dealer { border:1px solid #ccc !important; }
    .spec-val.active-filter { font-weight:bold !important; }
    .no-print { display:none !important; }
  }

  /* ---- Print: compare modal ---- */
  @media print {
    body.print-compare header,
    body.print-compare .layout,
    body.print-compare .compare-bar,
    body.print-compare .detail-modal-backdrop,
    body.print-compare .modal-backdrop,
    body.print-compare .expand-btn { display:none !important; }

    body.print-compare .compare-modal-backdrop {
      display:block !important; position:static !important;
      background:none !important; padding:0 !important;
    }
    body.print-compare .compare-modal {
      box-shadow:none !important; border:none !important;
      max-width:100% !important; width:100% !important; padding:0 !important;
    }
    body.print-compare .modal-close,
    body.print-compare .header-btn { display:none !important; }
    body.print-compare .compare-table th,
    body.print-compare .compare-table td { color:#111 !important; border-color:#ccc !important; }
    body.print-compare .compare-table .best { color:#2a6e2a !important; }
  }

  /* ---- Responsive ---- */
  @media (max-width:900px) { .grid { grid-template-columns:1fr; } }
  @media (max-width:700px) {
    .layout { grid-template-columns:1fr; height:auto; }
    .filters { border-right:none; border-bottom:1px solid var(--border); }
    .results-pane { height:auto; }
  }
</style>
</head>
<body>

<header>
  <h1>Product Selector</h1>
  <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <button class="header-btn" id="density-btn" onclick="toggleDensity()">Compact</button>
    <button class="header-btn no-print" onclick="window.print()">Print Results</button>
  </div>
</header>

<!-- ===== WEIGHT CALC MODAL ===== -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeCalc()">✕</button>
    <div class="modal-title">Door Weight Calculator</div>
    <div class="modal-field"><label>Door Height</label>
      <select id="calc-height">
        <option value="">Select...</option>
        <option value="7">7 ft</option><option value="8">8 ft</option><option value="9">9 ft</option>
        <option value="10">10 ft</option><option value="11">11 ft</option><option value="12">12 ft</option>
        <option value="13">13 ft</option><option value="14">14 ft</option>
      </select>
    </div>
    <div class="modal-field"><label>Door Width</label>
      <select id="calc-width">
        <option value="">Select...</option>
        <option value="7">7 ft</option><option value="8">8 ft</option><option value="9">9 ft</option>
        <option value="10">10 ft</option><option value="11">11 ft</option><option value="12">12 ft</option>
        <option value="13">13 ft</option><option value="14">14 ft</option><option value="15">15 ft</option>
        <option value="16">16 ft</option><option value="17">17 ft</option><option value="18">18 ft</option>
        <option value="19">19 ft</option><option value="20">20 ft</option>
      </select>
    </div>
    <div class="modal-field"><label>Door Material</label>
      <select id="calc-material">
        <option value="">Select...</option>
        <option value="wood">Wood (~4.6 lbs/sq ft)</option>
        <option value="aluminum">Aluminum (~1.3 lbs/sq ft)</option>
        <option value="steel">Steel (~3.8 lbs/sq ft)</option>
      </select>
    </div>
    <div class="modal-field"><label>Insulation</label>
      <select id="calc-insulation">
        <option value="non-insulated">Non-Insulated</option>
        <option value="insulated">Insulated (+20 lbs)</option>
      </select>
    </div>
    <div class="modal-field"><label>Windows</label>
      <select id="calc-windows">
        <option value="no-windows">No Windows</option>
        <option value="has-windows">Has Windows (+3.5 lbs each)</option>
      </select>
    </div>
    <div class="modal-field"><label>Hurricane Reinforcement Brackets</label>
      <select id="calc-reinforcement">
        <option value="none">Does Not Have Reinforcement Brackets</option>
        <option value="has-reinforcement">Has Reinforcement Brackets (+10 lbs)</option>
      </select>
    </div>
    <button class="modal-calc-btn" onclick="calcWeight()">Calculate Weight</button>
    <div class="modal-result" id="calc-result">
      <div class="result-weight" id="result-weight-num"></div>
      <div class="result-label" id="result-weight-label"></div>
      <div class="result-breakdown" id="result-breakdown"></div>
      <button class="apply-btn" id="apply-weight-btn" onclick="applyCalcWeight()">Apply to Door Weight Filter</button>
    </div>
  </div>
</div>

<!-- ===== COMPARE BAR ===== -->
<div class="compare-bar" id="compare-bar">
  <span>Compare:</span>
  <div id="compare-tags" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  <button class="compare-go-btn" onclick="openCompare()">Compare</button>
  <button class="compare-clear-btn" onclick="clearCompare()">Clear</button>
</div>

<!-- ===== COMPARE MODAL ===== -->
<div class="compare-modal-backdrop" id="compare-modal-backdrop" onclick="closeCompareIfBackdrop(event)">
  <div class="compare-modal">
    <button class="modal-close" onclick="closeCompare()">✕</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div class="modal-title" style="margin-bottom:0">Model Comparison</div>
      <button class="header-btn" style="margin-left:auto" onclick="printCompare()">Print</button>
    </div>
    <div id="compare-table-wrap"></div>

    doorType:      toArr(r.door_type).map(d => d.replace('*','').trim().toLowerCase()),
    battery:       (r.battery||'').toLowerCase(),
    wifi:          r.wifi === true || r.wifi === 'yes',
    hpc:           r.hpc ? parseFloat(r.hpc) : null,
    maxHeight:     r.max_door_height ? parseInt(r.max_door_height) : null,
    maxWeight:     r.max_door_weight ? parseInt(r.max_door_weight) : null,
    motorWarranty: r.motor_warranty  ? parseInt(r.motor_warranty)  : null,
    partsWarranty: r.parts_warranty  ? parseInt(r.parts_warranty)  : null,
    speed:         r.opening_speed   || '',
    stores:        toArr(r.store).filter(s => s.toLowerCase() !== 'professional dealer'),
    storeUrls:     toArr(r.store_urls),
    url:           r.url || '',
    manual:        r.manual || '',
    warranty:      r.warranty || '',
    parts:         r.replacement_parts || '',
  };
}
const MODELS = (typeof MODELS_DATA !== 'undefined' ? MODELS_DATA : []).map(normalizeRow);

// ===== State =====
const compareSet = new Set();
let currentDetailIndex = -1;
let currentFilteredModels = [];
let densityCompact = false;
let sidebarCollapsed = false;
let kbFocusIndex = -1;

// ===== Helpers =====
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function isUrl(v) { return v && v.startsWith('http'); }

function formatHpc(h) {
  const map = {0.5:'½', 0.75:'¾', 1:'1', 1.25:'1¼', 2:'2'};
  if (h == null) return null;
  return `<span style="font-family:Arial,sans-serif;font-size:16px">${map[h]||h}</span> HPc`;
}

function spec(label, val, highlight) {
  const display = (val != null && val !== '') ? val : '—';
  const cls = display === '—' ? ' empty' : (highlight ? ' active-filter' : '');
  return `<div class="spec-item"><div class="spec-label">${label}</div><div class="spec-val${cls}">${display}</div></div>`;
}

// ===== Fuzzy search =====
function fuzzyMatch(query, target) {
  // Returns true if all chars of query appear in order in target
  let qi = 0;
  for (let i = 0; i < target.length && qi < query.length; i++) {
    if (target[i] === query[qi]) qi++;
  }
  return qi === query.length;
}

function searchMatch(m, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  const modelL = m.model.toLowerCase();
  const nameL  = m.name.toLowerCase();
  // Exact substring first
  if (modelL.includes(q) || nameL.includes(q)) return true;
  // Fuzzy fallback
  return fuzzyMatch(q, modelL) || fuzzyMatch(q, nameL);
}

// ===== Store filter =====
function buildStoreFilter() {
  const stores = new Set();
  MODELS.forEach(m => m.stores.forEach(s => stores.add(s)));
  const sel = document.getElementById('f-store');
  [...stores].sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

// ===== Filters =====
function getFilters() {
  return {
    avail:    document.getElementById('f-avail').value,
    store:    document.getElementById('f-store').value,
    drive:    document.getElementById('f-drive').value,
    doortype: document.getElementById('f-doortype').value,
    height:   document.getElementById('f-height').value,
    weight:   document.getElementById('f-weight').value,
    hpc:      document.getElementById('f-hpc').value,
    battery:  document.getElementById('f-battery').value,
    wifi:     document.getElementById('f-wifi').value,
    sort:     document.getElementById('f-sort').value,
  };
}

function countActiveFilters(f) {
  return ['avail','store','drive','doortype','height','weight','hpc','battery','wifi']
    .filter(k => f[k]).length;
}

function filterModels(f) {
  return MODELS.filter(m => {
    if (f.avail && m.avail !== f.avail) return false;
    if (f.store && !m.stores.includes(f.store)) return false;
    if (f.drive && !m.drive.includes(f.drive.toLowerCase())) return false;
    if (f.doortype === 'sectional'  && !m.doorType.includes('sectional'))  return false;
    if (f.doortype === 'one-piece'  && !m.doorType.includes('one-piece'))  return false;
    if (f.height) {
      // Improved: show models whose maxHeight >= selected height
      const h = parseInt(f.height);
      if (!m.maxHeight || m.maxHeight < h) return false;
    }
    if (f.weight) {
      if (!m.maxWeight || m.maxWeight < parseInt(f.weight)) return false;
    }
    if (f.hpc && m.hpc !== parseFloat(f.hpc)) return false;
    if (f.battery === 'included'   && m.battery !== 'included')   return false;
    if (f.battery === 'compatible' && m.battery !== 'compatible') return false;
    if (f.battery === 'none'       && m.battery === 'included')   return false;
    if (f.wifi === 'yes' && !m.wifi)  return false;
    if (f.wifi === 'no'  &&  m.wifi)  return false;
    return true;
  });
}

const SERIES_MAP = {"6072":"Wall Mount","6172":"Wall Mount","6070H":"Wall Mount","6070H-B":"Wall Mount","6170H":"Wall Mount","6170H-B":"Wall Mount","4063":"NGX Screwdrive","4063B":"NGX Screwdrive","4064H":"NGX Screwdrive","4064H-B":"NGX Screwdrive","4164H":"NGX Screwdrive","4164H-B":"NGX Screwdrive","4062":"NGX Screwdrive","3022":"NGX Chain/Belt","3024H":"NGX Chain/Belt","3024H-B":"NGX Chain/Belt","3042":"NGX Chain/Belt","3124H":"NGX Chain/Belt","3124H-B":"NGX Chain/Belt","3142":"NGX Chain/Belt","4042":"NGX Chain/Belt","4124H":"NGX Chain/Belt","4124H-B":"NGX Chain/Belt","G3120HL":"ELO","G3120HL-B":"ELO","1035":"ELO","1055":"ELO","1135":"ELO","2033":"ELO","2035":"ELO","2055":"ELO","3035":"ELO","3053":"ELO","3055":"ELO","3155D":"ELO","7035":"ELO","7055":"ELO","7055D":"ELO","7155":"ELO","7155D":"ELO","D7155L":"ELO","E7155L":"ELO","1028":"OPP","1028B":"OPP","1128":"OPP","1128B":"OPP","2028":"OPP","2028B":"OPP","2128":"OPP","2128B":"OPP","2128BL":"OPP","2128L":"OPP","3120H":"OPP","3120H-B":"OPP","3120HL":"OPP","3120HL-B":"OPP"};
const SERIES_ORDER = ["Wall Mount","NGX Screwdrive","NGX Chain/Belt","ELO","OPP"];
function sortModels(models, key) {
  return [...models].sort((a,b) => {
    switch(key) {
      case 'hpc':          return (b.hpc||0)-(a.hpc||0);
      case 'motorWarranty':return (b.motorWarranty||0)-(a.motorWarranty||0);
      case 'maxWeight':    return (b.maxWeight||0)-(a.maxWeight||0);
      case 'name':         return a.name.localeCompare(b.name);
      case 'series': {
        const ai = SERIES_ORDER.indexOf(SERIES_MAP[a.model]||'');
        const bi = SERIES_ORDER.indexOf(SERIES_MAP[b.model]||'');
        const si = (ai===-1?99:ai) - (bi===-1?99:bi);
        return si !== 0 ? si : a.model.localeCompare(b.model,undefined,{numeric:true});
      }
      default:             return a.model.localeCompare(b.model,undefined,{numeric:true});
    }
  });
}

function findMostRestrictiveFilter(f) {
  const keys = ['avail','store','drive','doortype','height','weight','hpc','battery','wifi'];
  const labels = {avail:'Channel',store:'Store',drive:'Drive Type',doortype:'Door Type',
    height:'Door Height',weight:'Door Weight',hpc:'Motor Power',battery:'Battery Backup',wifi:'Wi-Fi'};
  let best=null, bestCount=0;
  for (const k of keys) {
    if (!f[k]) continue;
    const count = filterModels({...f,[k]:''}).length;
    if (count > bestCount) { bestCount=count; best=k; }
  }
  return best ? {key:best,label:labels[best],count:bestCount} : null;
}

// ===== Apply filters =====
function applyFilters() {
  const f = getFilters();
  currentFilteredModels = sortModels(filterModels(f), f.sort);
  kbFocusIndex = -1;

  // Reset button label
  const active = countActiveFilters(f);
  document.getElementById('reset-btn').textContent =
    active > 0 ? `Reset Filters (${active})` : 'Reset All Filters';

  // URL state
  const params = new URLSearchParams();
  ['avail','store','drive','doortype','height','weight','hpc','battery','wifi','sort']
    .forEach(k => { if(f[k]) params.set(k,f[k]); });
  history.replaceState(null,'',params.toString()?'?'+params.toString():location.pathname);

  // Tab title
  document.title = currentFilteredModels.length > 0
    ? `(${currentFilteredModels.length}) Product Selector`
    : 'Product Selector';

  renderResults(currentFilteredModels, f);
}

// ===== Render =====
function renderResults(models, f) {
  const grid  = document.getElementById('grid');
  const count = document.getElementById('count');
  count.textContent = `${models.length} result${models.length!==1?'s':''}`;

  if (models.length === 0) {
    const suggestion = countActiveFilters(f) > 0 ? findMostRestrictiveFilter(f) : null;
    const hint = suggestion
      ? `<p>Try removing the <span class="suggestion-link" onclick="relaxFilter('${suggestion.key}')">${suggestion.label}</span> filter — that would show ${suggestion.count} result${suggestion.count!==1?'s':''}.</p>`
      : '<p>Try resetting your filters.</p>';
    grid.innerHTML = `<div class="no-results"><h3>No models match your filters</h3>${hint}</div>`;
    return;
  }

  grid.innerHTML = models.map((m,i) => {
    const availClass = m.avail==='retail' ? 'avail-retail' : 'avail-dealer';
    const availLabel = m.avail==='retail' ? 'Retail' : 'Professional';
    const driveLabel = m.drive.map(cap).join(' / ') || '—';
    const doorLabel  = m.doorType.length ? m.doorType.map(cap).join(' / ') : null;
    const storesHtml = m.avail==='dealer'
      ? `<div class="stores-row">Available at: Professional Dealer</div>`
      : (m.stores.length ? `<div class="stores-row">Available at: ${m.stores.map((s,i) => { const u = m.storeUrls && m.storeUrls[i]; return u ? `<a class="store-link" href="${u}" target="_blank">${s}</a>` : s; }).join(' · ')}</div>` : '');
    const linkHtml = [
      isUrl(m.url)      ? `<a class="product-link" href="${m.url}"      target="_blank">Product Page</a>` : '',
      isUrl(m.manual)   ? `<a class="product-link" href="${m.manual}"   target="_blank">Manual</a>`       : '',
      isUrl(m.warranty) ? `<a class="product-link" href="${m.warranty}" target="_blank">Warranty</a>`     : '',
      isUrl(m.parts)    ? `<a class="product-link" href="${m.parts}"    target="_blank">Parts</a>`        : '',
    ].filter(Boolean).join('');
    const batteryVal = m.battery==='included'   ? '<span style="color:#7cb87c">Included</span>'
                     : m.battery==='compatible' ? 'Compatible' : 'Incompatible';
    const wifiVal    = m.wifi ? '<span style="color:#7cb87c">Integrated</span>' : 'Compatible';
    const motorWar   = m.motorWarranty ? (m.motorWarranty===99?'Lifetime':`${m.motorWarranty} yr`) : null;
    const partsWar   = m.partsWarranty ? `${m.partsWarranty} yr` : null;

    const hl = {drive:!!f.drive, wifi:!!f.wifi, battery:!!f.battery,
                height:!!f.height, weight:!!f.weight, hpc:!!f.hpc};

    const specGrid = `<div class="spec-grid">
      ${spec('Drive',          driveLabel,                              hl.drive)}
      ${spec('Motor Power',    formatHpc(m.hpc),                        hl.hpc)}
      ${spec('Battery Backup', batteryVal,                              hl.battery)}
      ${spec('Wi-Fi',          wifiVal,                                 hl.wifi)}
      ${spec('Max Height',     m.maxHeight ? m.maxHeight+' ft'  : null, hl.height)}
      ${spec('Max Weight',     m.maxWeight ? m.maxWeight+' lbs' : null, hl.weight)}
      ${spec('Door Type',      doorLabel)}
      ${spec('Motor Warranty', motorWar)}
      ${spec('Parts Warranty', partsWar)}
      ${spec('Opening Speed',  m.speed||null)}
      ${spec('Channel',        availLabel)}
    </div>`;

    const isSelected = compareSet.has(m.model);
    const compareBtn = `<button class="compare-check${isSelected?' checked':''}" onclick="event.stopPropagation();toggleCompare('${m.model}')">${isSelected?'✓ Comparing':'+ Compare'}</button>`;

    return `<div class="card${isSelected?' selected-for-compare':''}" id="card-${m.model}"
      data-index="${i}">
      <div class="card-top">
        <div><div class="card-model">${m.model}</div><div class="card-name">${m.name}</div></div>
        <span class="avail-badge ${availClass}">${availLabel}</span>
      </div>
      ${specGrid}
      ${storesHtml}
      <div class="card-links" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${linkHtml}
        ${compareBtn}
      </div>
    </div>`;
  }).join('');
}

// ===== Reset / Relax =====
function resetFilters() {
  document.querySelectorAll('.filters select').forEach(s => s.value='');
  applyFilters();
}

function relaxFilter(key) {
  const el=document.getElementById('f-'+key); if(el) el.value='';
  applyFilters();
}

// ===== URL restore =====
function restoreFromUrl() {
  const p = new URLSearchParams(location.search);
  ['avail','store','drive','doortype','height','weight','hpc','battery','wifi','sort'].forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el && p.get(k)) el.value = p.get(k);
  });
}

// ===== Sidebar =====
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('layout').classList.toggle('sidebar-collapsed', sidebarCollapsed);
}

// ===== Density toggle =====
function toggleDensity() {
  densityCompact = !densityCompact;
  document.getElementById('grid').classList.toggle('compact', densityCompact);
  document.getElementById('density-btn').classList.toggle('active', densityCompact);
  document.getElementById('density-btn').textContent = densityCompact ? 'Full View' : 'Compact';
}

// ===== Recently viewed =====
function addToRecentlyViewed(modelId) {
  let recent = JSON.parse(localStorage.getItem('ps_recent')||'[]');
  recent = [modelId, ...recent.filter(id=>id!==modelId)].slice(0,5);
  localStorage.setItem('ps_recent', JSON.stringify(recent));
  renderRecentlyViewed();
}

function renderRecentlyViewed() {
  const recent = JSON.parse(localStorage.getItem('ps_recent')||'[]');
  const group = document.getElementById('recent-group');
  const list  = document.getElementById('recent-list');
  if (!group || !list) return;
  if (!recent.length) { group.style.display='none'; return; }
  group.style.display='block';
  list.innerHTML = recent.map(id => {
    const m = MODELS.find(x=>x.model===id);
    return m ? `<span class="recent-tag" title="${m.name}">${id}</span>` : '';
  }).filter(Boolean).join('');
}

// ===== Keyboard navigation =====


document.addEventListener('keydown', e => {
  // Ignore if typing in an input
  if (['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) {
    if (e.key === 'Escape') {
      document.activeElement.blur();
      closeCalc(); closeCompare();
    }
    return;
  }
  if (e.key === 'Escape') { closeCalc(); closeCompare(); resetFilters(); return; }

  const cards = document.querySelectorAll('.card');
  if (!cards.length) return;

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    kbFocusIndex = Math.min(kbFocusIndex+1, cards.length-1);
    cards[kbFocusIndex].focus();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    kbFocusIndex = Math.max(kbFocusIndex-1, 0);
    cards[kbFocusIndex].focus();
  }
});



// ===== Presets =====
function savePreset() {
  const name = prompt('Name this preset:');
  if (!name || !name.trim()) return;
  const f = getFilters();
  const presets = JSON.parse(localStorage.getItem('ps_presets')||'{}');
  presets[name.trim()] = f;
  localStorage.setItem('ps_presets', JSON.stringify(presets));
  renderPresets();
}

function loadPreset(name) {
  const presets = JSON.parse(localStorage.getItem('ps_presets')||'{}');
  const f = presets[name];
  if (!f) return;
  ['avail','store','drive','doortype','height','weight','hpc','battery','wifi','sort'].forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) el.value = f[k]||'';
  });
  applyFilters();
}

function deletePreset(name) {
  const presets = JSON.parse(localStorage.getItem('ps_presets')||'{}');
  delete presets[name];
  localStorage.setItem('ps_presets', JSON.stringify(presets));
  renderPresets();
}

function renderPresets() {
  const presets = JSON.parse(localStorage.getItem('ps_presets')||'{}');
  const list = document.getElementById('presets-list');
  if (!list) return;
  const names = Object.keys(presets);
  list.innerHTML = names.map(n =>
    `<span class="preset-tag" onclick="loadPreset('${n.replace(/'/g,"\\'")}')">
      ${n}
      <span class="preset-del" onclick="event.stopPropagation();deletePreset('${n.replace(/'/g,"\\'")}')">✕</span>
    </span>`
  ).join('');
}

// ===== Compare =====
function toggleCompare(modelId) {
  if (compareSet.has(modelId)) {
    compareSet.delete(modelId);
  } else {
    if (compareSet.size >= 5) { alert('You can compare up to 5 models at a time.'); return; }
    compareSet.add(modelId);
  }
  updateCompareBar();
  const card = document.getElementById('card-'+modelId);
  if (card) {
    const btn = card.querySelector('.compare-check');
    if (compareSet.has(modelId)) {
      card.classList.add('selected-for-compare');
      if (btn) { btn.textContent='✓ Comparing'; btn.classList.add('checked'); }
    } else {
      card.classList.remove('selected-for-compare');
      if (btn) { btn.textContent='+ Compare'; btn.classList.remove('checked'); }
    }
  }
  // Update detail modal compare button if open
  const dcb = document.getElementById('detail-compare-btn');
  if (dcb && currentFilteredModels[currentDetailIndex]?.model === modelId) {
    dcb.textContent = compareSet.has(modelId) ? '✓ Comparing' : '+ Compare';
  }
}

function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  const tags = document.getElementById('compare-tags');
  if (!compareSet.size) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  tags.innerHTML = [...compareSet].map(id =>
    `<span class="compare-tag" onclick="toggleCompare('${id}')" title="Remove">${id} ✕</span>`
  ).join('');
}

function clearCompare() {
  [...compareSet].forEach(id => {
    compareSet.delete(id);
    const card = document.getElementById('card-'+id);
    if (card) {
      card.classList.remove('selected-for-compare');
      const btn = card.querySelector('.compare-check');
      if (btn) { btn.textContent='+ Compare'; btn.classList.remove('checked'); }
    }
  });
  updateCompareBar();
}

function openCompare() {
  if (compareSet.size < 2) { alert('Select at least 2 models to compare.'); return; }
  const selected = MODELS.filter(m => compareSet.has(m.model));
  const rows = [
    ['Name',           m => m.name,                                         ''],
    ['Drive',          m => m.drive.map(cap).join(' / ')||'—',              ''],
    ['Channel',        m => m.avail==='retail'?'Retail':'Professional',     ''],
    ['Wi-Fi',          m => m.wifi?'Integrated':'—',                        ''],
    ['Battery Backup', m => cap(m.battery)||'—',                            ''],
    ['Max Height',     m => m.maxHeight?m.maxHeight+' ft':'—',              'high'],
    ['Max Weight',     m => m.maxWeight?m.maxWeight+' lbs':'—',             'high'],
    ['Motor Power',    m => m.hpc?m.hpc+' HPc':'—',                        'high'],
    ['Motor Warranty', m => m.motorWarranty?(m.motorWarranty===99?'Lifetime':m.motorWarranty+' yr'):'—', 'high'],
    ['Parts Warranty', m => m.partsWarranty?m.partsWarranty+' yr':'—',     'high'],
    ['Opening Speed',  m => m.speed||'—',                                   ''],
  ];

  const headerRow = `<tr><th class="row-label"></th>${selected.map(m=>
    `<th>${m.model}<br><span style="font-size:11px;font-weight:normal;color:#aaa">${m.name}</span></th>`
  ).join('')}</tr>`;

  const dataRows = rows.map(([label,fn,prefer]) => {
    const vals = selected.map(fn);
    let bestVal = null;
    if (prefer==='high') {
      const nums = vals.map(v=>parseFloat(v));
      const max = Math.max(...nums.filter(n=>!isNaN(n)));
      if (max > 0) bestVal = max;
    }
    const cells = vals.map(v => {
      const num = parseFloat(v);
      const isBest = bestVal!==null && num===bestVal;
      return `<td class="${isBest?'best':''}">${v}</td>`;
    }).join('');
    return `<tr><td class="row-label-cell">${label}</td>${cells}</tr>`;
  }).join('');

  document.getElementById('compare-table-wrap').innerHTML =
    `<table class="compare-table">${headerRow}${dataRows}</table>`;
  document.getElementById('compare-modal-backdrop').classList.add('open');
}

function closeCompare() { document.getElementById('compare-modal-backdrop').classList.remove('open'); }
function closeCompareIfBackdrop(e) { if(e.target===document.getElementById('compare-modal-backdrop')) closeCompare(); }

function printCompare() {
  document.body.classList.add('print-compare');
  window.print();
  document.body.classList.remove('print-compare');
}

// ===== Weight Calculator =====
function openCalc()  { document.getElementById('modal-backdrop').classList.add('open'); }
function closeCalc() { document.getElementById('modal-backdrop').classList.remove('open'); }
function closeModal(e) { if(e.target===document.getElementById('modal-backdrop')) closeCalc(); }

function calcWeight() {
  const h     = parseFloat(document.getElementById('calc-height').value);
  const w     = parseFloat(document.getElementById('calc-width').value);
  const mat   = document.getElementById('calc-material').value;
  const ins   = document.getElementById('calc-insulation').value;
  const win   = document.getElementById('calc-windows').value;
  const reinf = document.getElementById('calc-reinforcement').value;
  if (!h||!w||!mat) { alert('Please select height, width, and material.'); return; }
  const density  = {wood:4.6,aluminum:1.3,steel:3.8}[mat];
  const sqft     = h*w;
  const base     = sqft*density;
  const insMod   = ins==='insulated'?20:0;
  const numWin   = Math.round(w/9*4);
  const winMod   = win==='has-windows'?numWin*3.5:0;
  const reinfMod = reinf==='has-reinforcement'?10:0;
  const total    = Math.round(base+insMod+winMod+reinfMod);
  const matName  = {wood:'Wood',aluminum:'Aluminum',steel:'Steel'}[mat];
  const breakdown = [
    `${sqft} sq ft × ${density} lbs/sq ft = ${Math.round(base)} lbs (${matName})`,
    insMod   ? `+ ${insMod} lbs (insulation)` : '',
    winMod   ? `+ ${winMod.toFixed(1)} lbs (${numWin} window${numWin!==1?'s':''} × 3.5 lbs)` : '',
    reinfMod ? `+ ${reinfMod} lbs (reinforcement brackets)` : '',
  ].filter(Boolean).join('<br>');
  let category, catVal;
  if      (total<=350) { category='Up to 350 lbs'; catVal='350'; }
  else if (total<=500) { category='Up to 500 lbs'; catVal='500'; }
  else if (total<=750) { category='Up to 750 lbs'; catVal='750'; }
  else                 { category='Up to 850 lbs'; catVal='850'; }
  document.getElementById('result-weight-num').textContent   = `~${total} lbs`;
  document.getElementById('result-weight-label').textContent = `Recommended filter: ${category}`;
  document.getElementById('result-breakdown').innerHTML      = breakdown;
  document.getElementById('apply-weight-btn').dataset.val    = catVal;
  document.getElementById('calc-result').classList.add('visible');
}

function applyCalcWeight() {
  const val = document.getElementById('apply-weight-btn').dataset.val;
  if (val) { document.getElementById('f-weight').value=val; applyFilters(); }
  closeCalc();
}

// ===== Init =====
document.querySelectorAll('.filters select').forEach(el => el.addEventListener('change', applyFilters));
buildStoreFilter();
restoreFromUrl();
renderRecentlyViewed();
applyFilters();
</script>
</body>
</html>
